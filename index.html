<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Twitty - RTL-first terminal emulator for mixed Arabic and English text." />
    <meta name="theme-color" content="#0b0d10" />
    <link rel="icon" type="image/png" href="/icons/icon.png" />
    <title>Twitty</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background-color: #0b0d10; }
      #root:empty::after {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        width: 22px;
        height: 22px;
        margin: -11px 0 0 -11px;
        border: 2px solid #2a2f36;
        border-top-color: #3fb1ea;
        border-radius: 50%;
        animation: twitty-spin 0.8s linear infinite;
      }
      @keyframes twitty-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #root:empty::after { animation: none; border-top-color: #2a2f36; }
      }
      /* Visible on-screen error overlay so mount failures aren't a blank screen.
         Any uncaught error or mount timeout is rendered as red text the user
         can read and report, even without opening DevTools. */
      #err-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0;
        max-height: 70vh;
        overflow: auto;
        background: #3a0d0d;
        color: #ffb4b4;
        padding: 16px 20px;
        font: 13px/1.5 ui-monospace, Consolas, monospace;
        white-space: pre-wrap;
        word-break: break-word;
        z-index: 9999;
        border-bottom: 2px solid #f87171;
      }
      #err-overlay h2 { margin: 0 0 8px; font-size: 14px; color: #fecaca; }
    </style>
  </head>
  <body>
    <div id="err-overlay"><h2>Twitty — runtime error</h2><div id="err-text"></div></div>
    <div id="root"></div>
    <script src="/error-overlay.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
