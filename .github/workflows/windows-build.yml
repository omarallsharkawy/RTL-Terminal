name: Build RTL Terminal

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust stable MSVC
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Normalize config encoding
        run: node scripts/normalize-config.cjs

      - name: Typecheck and build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Build Tauri Windows app
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --bundles nsis --ci --no-sign

      - name: List build outputs
        if: always()
        shell: pwsh
        run: |
          if (Test-Path src-tauri/target/x86_64-pc-windows-msvc/release) {
            Get-ChildItem -Recurse src-tauri/target/x86_64-pc-windows-msvc/release/bundle -ErrorAction SilentlyContinue | Select-Object FullName, Length
            Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release -Filter *.exe -ErrorAction SilentlyContinue | Select-Object FullName, Length
          }
          if (Test-Path src-tauri/target/release) {
            Get-ChildItem -Recurse src-tauri/target/release/bundle -ErrorAction SilentlyContinue | Select-Object FullName, Length
            Get-ChildItem src-tauri/target/release -Filter *.exe -ErrorAction SilentlyContinue | Select-Object FullName, Length
          }

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitty-windows-installer
          if-no-files-found: error
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi


      - name: Create GitHub release
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "windows-${{ github.run_number }}.${{ github.run_attempt }}"
          $releaseName = "Twitty Windows build ${{ github.run_number }}.${{ github.run_attempt }}"
          $assets = @()

          $candidateRoots = @(
            "src-tauri/target/x86_64-pc-windows-msvc/release",
            "src-tauri/target/release"
          )

          foreach ($root in $candidateRoots) {
            if (!(Test-Path $root)) { continue }
            if (Test-Path "$root/bundle") {
              $assets += Get-ChildItem "$root/bundle" -Recurse -Include "*.exe", "*.msi" -File -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            }
          }

          $assets = @($assets | Sort-Object -Unique)
          if ($assets.Count -eq 0) {
            Write-Error "No release assets found."
            exit 1
          }

          gh release create $tag $assets `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title $releaseName `
            --notes "Automated Windows build from workflow run ${{ github.run_number }}.${{ github.run_attempt }}."

