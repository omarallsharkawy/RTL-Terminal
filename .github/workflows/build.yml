name: Build RTL Terminal

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust stable MSVC
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Normalize config encoding
        run: node scripts/normalize-config.cjs

      - name: Typecheck and build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml --target x86_64-pc-windows-msvc

      - name: Build Tauri Windows app
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --bundles nsis --ci --no-sign

      - name: List build outputs
        if: always()
        shell: pwsh
        run: |
          if (Test-Path src-tauri/target/x86_64-pc-windows-msvc/release) {
            Get-ChildItem -Recurse src-tauri/target/x86_64-pc-windows-msvc/release/bundle -ErrorAction SilentlyContinue | Select-Object FullName, Length
            Get-ChildItem src-tauri/target/x86_64-pc-windows-msvc/release -Filter *.exe -ErrorAction SilentlyContinue | Select-Object FullName, Length
          }
          if (Test-Path src-tauri/target/release) {
            Get-ChildItem -Recurse src-tauri/target/release/bundle -ErrorAction SilentlyContinue | Select-Object FullName, Length
            Get-ChildItem src-tauri/target/release -Filter *.exe -ErrorAction SilentlyContinue | Select-Object FullName, Length
          }

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitty-windows-installer
          if-no-files-found: error
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi

  build-linux:
    name: Build Linux desktop app (Fedora/Ubuntu)
    runs-on: ubuntu-latest

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf rpm

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Normalize config encoding
        run: node scripts/normalize-config.cjs

      - name: Typecheck and build frontend
        run: npm run build

      - name: Build Tauri Linux app
        run: npm run tauri:build -- --bundles deb,rpm,appimage --ci

      - name: List build outputs
        if: always()
        run: |
          ls -R src-tauri/target/release/bundle || true

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v4
        with:
          name: twitty-linux-packages
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: twitty-windows-installer
          path: ./artifacts-windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: twitty-linux-packages
          path: ./artifacts-linux

      - name: List artifacts
        run: |
          ls -R ./artifacts-windows
          ls -R ./artifacts-linux

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          release_name="Twitty ${GITHUB_REF_NAME}"
          
          # Find all release assets
          assets=()
          while IFS= read -r -d '' file; do
            assets+=("$file")
          done < <(find ./artifacts-windows ./artifacts-linux -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -print0)
          
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi
          
          echo "Found assets to upload:"
          printf '%s\n' "${assets[@]}"
          
          gh release create "$tag" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$release_name" \
            --notes "Automated build for Windows and Linux (Fedora/Ubuntu) from workflow run ${{ github.run_number }}."
